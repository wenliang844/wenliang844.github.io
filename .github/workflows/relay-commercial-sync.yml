name: Sync commercial relay data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      RELAY_COMMERCIAL_SOURCE_URL: ${{ secrets.RELAY_COMMERCIAL_SOURCE_URL }}
      RELAY_COMMERCIAL_TOKEN: ${{ secrets.RELAY_COMMERCIAL_TOKEN }}
      RELAY_COMMERCIAL_HEADERS: ${{ secrets.RELAY_COMMERCIAL_HEADERS }}
      RELAY_COMMERCIAL_SOURCE_NAME: ${{ vars.RELAY_COMMERCIAL_SOURCE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync commercial relay data
        run: node scripts/update-commercial-relay.mjs

      - name: Validate relay data
        run: node --test tests/relay.test.mjs

      - name: Build site
        run: npm run build

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No commercial relay data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/relay-providers.json ai/relay/index.html search-index.json sitemap.xml robots.txt index.xml post/index.xml categories/index.xml
          git commit -m "chore: sync commercial relay data"
          git push
